<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-S 스토리</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;900&family=IBM+Plex+Mono:wght@300;400&display=swap');

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #c8a96e;
    --accent-dim: #7a6440;
    --text: #d4d0c8;
    --text-dim: #6b6760;
    --red: #b85c4a;
    --green: #4a8c6e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif KR', serif;
    min-height: 100vh;
    line-height: 1.7;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .container { max-width: 860px; margin: 0 auto; padding: 60px 24px; position: relative; z-index: 1; }

  header { border-bottom: 1px solid var(--border); padding-bottom: 40px; margin-bottom: 48px; }

  .site-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 20px; }

  h1 { font-size: clamp(28px, 5vw, 48px); font-weight: 900; line-height: 1.2; color: #f0ece0; margin-bottom: 10px; }

  .subtitle { font-size: 14px; color: var(--text-dim); font-weight: 300; }

  .tabs { display: flex; gap: 0; margin-bottom: 40px; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }

  .tab-btn { flex: 1; padding: 12px 8px; background: transparent; border: none; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.05em; cursor: pointer; transition: all 0.2s; border-right: 1px solid var(--border); }

  .tab-btn:last-child { border-right: none; }

  .tab-btn.active { background: var(--accent); color: #0e0e0e; }

  .tab-btn:hover:not(.active) { background: var(--surface); color: var(--text); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .section-header { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.25em; color: var(--accent-dim); text-transform: uppercase; margin-bottom: 20px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 24px; margin-bottom: 16px; transition: border-color 0.2s; }

  .card:hover { border-color: var(--accent-dim); }

  .card-title { font-size: 16px; font-weight: 600; color: #f0ece0; margin-bottom: 6px; }

  .card-meta { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); margin-bottom: 12px; }

  .card-desc { font-size: 14px; color: var(--text); font-weight: 300; line-height: 1.8; }

  .tag { display: inline-block; padding: 2px 8px; background: #1e1e1e; border: 1px solid var(--border); border-radius: 2px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--accent); margin-right: 6px; margin-top: 8px; }

  .form-group { margin-bottom: 20px; }

  label { display: block; font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }

  input, textarea, select { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 12px 14px; color: var(--text); font-family: 'Noto Serif KR', serif; font-size: 14px; outline: none; transition: border-color 0.2s; resize: vertical; }

  input:focus, textarea:focus, select:focus { border-color: var(--accent); }

  select option { background: var(--surface); }

  .btn { padding: 12px 28px; border: none; border-radius: 4px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s; }

  .btn-primary { background: var(--accent); color: #0e0e0e; }
  .btn-primary:hover { background: #d4b87a; }
  .btn-primary:disabled { background: var(--accent-dim); cursor: not-allowed; opacity: 0.6; }

  .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent-dim); color: var(--text); }

  .btn-danger { background: transparent; color: var(--red); border: 1px solid #3a1f1a; font-size: 11px; padding: 6px 14px; }
  .btn-success { background: var(--green); color: #fff; font-size: 11px; padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; }

  .generate-box { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 32px; margin-bottom: 32px; }

  .char-selector { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-bottom: 20px; }

  .char-check { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #1a1a1a; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; transition: all 0.2s; }

  .char-check:hover { border-color: var(--accent-dim); }
  .char-check.selected { border-color: var(--accent); background: #1e1b14; }

  .char-check input[type="checkbox"] { width: auto; accent-color: var(--accent); }

  .char-check-name { font-size: 13px; color: var(--text); }

  .story-output { background: #111; border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 4px; padding: 32px; margin-top: 24px; display: none; }

  .story-output.visible { display: block; }

  .story-title { font-size: 20px; font-weight: 600; color: #f0ece0; margin-bottom: 20px; line-height: 1.4; }

  .story-body { font-size: 15px; font-weight: 300; line-height: 2; color: var(--text); white-space: pre-wrap; }

  .story-meta { margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }

  .story-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 24px; margin-bottom: 16px; cursor: pointer; transition: border-color 0.2s; }

  .story-card:hover { border-color: var(--accent-dim); }

  .story-card-title { font-size: 16px; font-weight: 600; color: #f0ece0; margin-bottom: 8px; }

  .story-card-preview { font-size: 13px; color: var(--text-dim); font-weight: 300; line-height: 1.6; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

  .loading { display: flex; align-items: center; gap: 12px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 24px 0; }

  .loading-dots span { display: inline-block; width: 4px; height: 4px; background: var(--accent); border-radius: 50%; margin: 0 2px; animation: bounce 1.2s infinite; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }

  .api-box { background: #1a1510; border: 1px solid #3a2e1a; border-radius: 4px; padding: 16px 20px; margin-bottom: 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

  .api-box input { background: transparent; border: none; border-bottom: 1px solid #3a2e1a; border-radius: 0; padding: 4px 8px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--accent); outline: none; width: 320px; }

  .api-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #a08060; white-space: nowrap; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; overflow-y: auto; padding: 40px 24px; }

  .modal-overlay.visible { display: flex; align-items: flex-start; justify-content: center; }

  .modal { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 40px; max-width: 720px; width: 100%; position: relative; }

  .modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--text-dim); font-size: 20px; cursor: pointer; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); font-size: 14px; font-weight: 300; }

  .divider { height: 1px; background: var(--border); margin: 32px 0; }

  .flex-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

  .world-badge { display: inline-block; padding: 3px 10px; background: #1a1510; border: 1px solid var(--accent-dim); border-radius: 2px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--accent); margin-bottom: 12px; }

  .status-bar { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); margin-bottom: 16px; padding: 8px 12px; background: var(--surface); border-radius: 4px; border: 1px solid var(--border); }

  .final-section { margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border); }

  .draft-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.2em; color: var(--accent-dim); text-transform: uppercase; margin-bottom: 8px; }

  .rules-list { list-style: none; }
  .rules-list li { display: flex; gap: 8px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; font-weight: 300; }
  .rules-list li button { margin-left: auto; background: none; border: none; color: var(--red); cursor: pointer; font-size: 16px; }

  .world-select { margin-bottom: 20px; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="site-label">T-S · AI 스토리 생성기</div>
    <h1 id="headerTitle">스토리 생성기</h1>
    <p class="subtitle" id="headerSubtitle">세계관을 선택하고 이야기를 시작하세요</p>
  </header>

  <!-- API 키 -->
  <div class="api-box">
    <span class="api-label">GEMINI API KEY</span>
    <input type="password" id="apiKey" placeholder="API 키 입력" oninput="localStorage.setItem('ts_gemini_key', this.value)">
  </div>

  <!-- 탭 -->
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('generate', this)">생성</button>
    <button class="tab-btn" onclick="showTab('stories', this)">스토리</button>
    <button class="tab-btn" onclick="showTab('characters', this)">인물</button>
    <button class="tab-btn" onclick="showTab('world', this)">세계관</button>
    <button class="tab-btn" onclick="showTab('settings', this)">설정</button>
  </div>

  <!-- 생성 탭 -->
  <div id="tab-generate" class="tab-content active">
    <div class="world-select">
      <label>세계관 선택</label>
      <select id="worldSelect" onchange="onWorldChange()"></select>
    </div>
    <div class="generate-box">
      <div class="section-header">등장인물 선택</div>
      <div class="char-selector" id="charSelector"></div>
      <div class="form-group">
        <label>핵심 사건 (한 문장으로)</label>
        <div class="flex-row" style="gap:8px;">
          <input type="text" id="situation" placeholder="예: 김씨 실수를 전 은행원에게 떠넘기려다 들키는 날" style="flex:1;">
          <button class="btn btn-ghost" onclick="randomAccident()" style="padding:12px 14px;white-space:nowrap;">🎲 돌발사고</button>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
        <div class="form-group" style="margin-bottom:0;">
          <label>서술 시점</label>
          <select id="pov">
            <option value="narrator">전지적 작가 시점</option>
            <option value="villain">얄미운 자의 1인칭 (꼰대 시점)</option>
            <option value="victim">성실한 자의 1인칭 (피해자 시점)</option>
            <option value="object">사물·시스템 시점 (바코드 스캐너 등)</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label>톤</label>
          <select id="tone">
            <option value="dry">숨 막히는 현실 + 건조한 유머</option>
            <option value="malicious">겉으론 밝지만 악의적인 농담</option>
            <option value="silent">아무도 웃지 않는 농담만 오가는 날</option>
            <option value="absurd">부조리극 (카프카식)</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>인물 관계 / 긴장감 (선택)</label>
        <input type="text" id="relation" placeholder="예: 전 은행원은 김씨를 무능하다 생각하지만 겉으론 선배 행세를 한다">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
        <div class="form-group" style="margin-bottom:0;">
          <label>추가 지시 (선택)</label>
          <textarea id="extra" rows="2" placeholder="예: 결말은 열린 결말로..."></textarea>
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label>이번 편에서 어길 규칙 (선택)</label>
          <input type="text" id="breakRule" placeholder="예: 성실한 사람이 오늘은 먼저 도망간다">
        </div>
      </div>
      <div class="flex-row">
        <button class="btn btn-primary" id="generateBtn" onclick="generateStory()">스토리 생성</button>
        <button class="btn btn-ghost" onclick="document.getElementById('situation').value='';document.getElementById('extra').value=''">초기화</button>
      </div>
      <div id="loadingIndicator" style="display:none;">
        <div class="loading"><div class="loading-dots"><span></span><span></span><span></span></div>이야기를 쓰고 있습니다...</div>
      </div>
      <div class="story-output" id="storyOutput">
        <div class="story-title" id="outputTitle"></div>
        <div class="story-body" id="outputBody"></div>
        <div class="final-section">
          <div class="draft-label">태그 (쉼표로 구분)</div>
          <input type="text" id="outputTags" placeholder="예: 야근, 갈등, 신입, 관리자" style="margin-bottom:16px;">
          <div class="draft-label">메모 / 최종안 작업</div>
          <textarea id="outputMemo" rows="4" placeholder="초안을 바탕으로 메모하거나 최종안을 작성하세요..."></textarea>
        </div>
        <div class="final-section" id="shortsSection" style="display:none;">
          <div class="flex-row" style="justify-content:space-between;margin-bottom:8px;"><div class="draft-label" style="color:#6ab0f5;">🎬 쇼츠 대본</div><button onclick="copyToClipboard('shortsBody')" style="background:none;border:1px solid #2a4a6a;border-radius:3px;color:#6ab0f5;font-size:10px;padding:3px 8px;cursor:pointer;font-family:'IBM Plex Mono',monospace;">📋 복사</button></div>
          <div id="shortsBody" class="story-body" style="font-size:14px;border-left:3px solid #6ab0f5;padding-left:16px;margin-top:8px;white-space:pre-wrap;"></div>
        </div>
        <div class="final-section" id="blogSection" style="display:none;">
          <div class="flex-row" style="justify-content:space-between;margin-bottom:8px;"><div class="draft-label" style="color:#8bc97a;">📝 블로그 글</div><button onclick="copyToClipboard('blogBody')" style="background:none;border:1px solid #2a4a2a;border-radius:3px;color:#8bc97a;font-size:10px;padding:3px 8px;cursor:pointer;font-family:'IBM Plex Mono',monospace;">📋 복사</button></div>
          <div id="blogBody" class="story-body" style="font-size:14px;border-left:3px solid #8bc97a;padding-left:16px;margin-top:8px;white-space:pre-wrap;"></div>
        </div>
        <div class="final-section" id="snsSection" style="display:none;">
          <div class="flex-row" style="justify-content:space-between;margin-bottom:8px;"><div class="draft-label" style="color:#c97ab8;">📱 SNS 글</div><button onclick="copyToClipboard('snsBody')" style="background:none;border:1px solid #4a2a4a;border-radius:3px;color:#c97ab8;font-size:10px;padding:3px 8px;cursor:pointer;font-family:'IBM Plex Mono',monospace;">📋 복사</button></div>
          <div id="snsBody" class="story-body" style="font-size:14px;border-left:3px solid #c97ab8;padding-left:16px;margin-top:8px;white-space:pre-wrap;"></div>
        </div>
        <div class="story-meta">
          <span id="outputMeta"></span>
          <div class="flex-row">
            <button class="btn btn-ghost" style="padding:6px 16px;font-size:11px;" onclick="generateStory()">↺ 다시 생성</button>
            <button class="btn btn-ghost" style="padding:6px 16px;font-size:11px;color:var(--accent);" onclick="sharpenStory()">✦ 날카롭게</button>
            <button class="btn btn-ghost" style="padding:6px 16px;font-size:11px;color:#6ab0f5;" onclick="convertToShorts()">🎬 쇼츠</button>
            <button class="btn btn-ghost" style="padding:6px 16px;font-size:11px;color:#8bc97a;" onclick="convertToBlog()">📝 블로그</button>
            <button class="btn btn-ghost" style="padding:6px 16px;font-size:11px;color:#c97ab8;" onclick="convertToSNS()">📱 SNS</button>
            <button class="btn btn-primary" style="padding:6px 16px;font-size:11px;" onclick="saveCurrentStory()">저장</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 스토리 탭 -->
  <div id="tab-stories" class="tab-content">
    <div class="flex-row" style="justify-content:space-between;margin-bottom:20px;">
      <div class="section-header" style="margin-bottom:0;">저장된 스토리</div>
    </div>
    <div id="storiesList"></div>
  </div>

  <!-- 인물 탭 -->
  <div id="tab-characters" class="tab-content">
    <div class="world-select">
      <label>세계관 선택</label>
      <select id="charWorldSelect" onchange="renderCharactersList()"></select>
    </div>
    <div class="section-header">등장인물</div>
    <div id="charactersList"></div>
    <div class="divider"></div>
    <div class="section-header">새 인물 추가</div>
    <div class="card">
      <div class="form-group">
        <label>이름</label>
        <input type="text" id="charName" placeholder="예: 박팀장">
      </div>
      <div class="form-group">
        <label>직책/역할</label>
        <input type="text" id="charRole" placeholder="예: 팀장, 파트타이머">
      </div>
      <div class="form-group">
        <label>성격 / 특징</label>
        <textarea id="charPersonality" rows="3" placeholder="외모, 말투, 행동 패턴..."></textarea>
      </div>
      <div class="form-group">
        <label>생존 전략</label>
        <input type="text" id="charStrategy" placeholder="예: 시스템 활용, 권위로 버티기...">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="form-group">
          <label>목표 (goal)</label>
          <input type="text" id="charGoal" placeholder="예: 팀장이 되는 것">
        </div>
        <div class="form-group">
          <label>두려움 (fear)</label>
          <input type="text" id="charFear" placeholder="예: 무능이 들통나는 것">
        </div>
      </div>
      <button class="btn btn-primary" onclick="addCharacter()">인물 추가</button>
    </div>
  </div>

  <!-- 세계관 탭 -->
  <div id="tab-world" class="tab-content">
    <div class="section-header">세계관 목록</div>
    <div id="worldsList"></div>
    <div class="divider"></div>
    <div class="section-header">새 세계관 추가</div>
    <div class="card">
      <div class="form-group"><label>제목</label><input type="text" id="worldTitle" placeholder="예: 착한 사람은 먼저 지친다"></div>
      <div class="form-group"><label>부제</label><input type="text" id="worldSubtitle" placeholder="예: 성실함은 손해가 되는 곳에서"></div>
      <div class="form-group"><label>장르</label><input type="text" id="worldGenre" placeholder="예: 블랙코미디, 직장 드라마"></div>
      <div class="form-group"><label>배경 설정</label><textarea id="worldSetting" rows="3" placeholder="공간, 분위기, 특징..."></textarea></div>
      <div class="form-group"><label>핵심 메시지</label><input type="text" id="worldMessage" placeholder="예: 이기심이 기술이 되는 곳"></div>
      <div class="form-group">
        <label>세계 규칙 (줄바꿈으로 구분)</label>
        <textarea id="worldRules" rows="4" placeholder="규칙 1&#10;규칙 2&#10;규칙 3"></textarea>
      </div>
      <button class="btn btn-primary" onclick="addWorld()">세계관 추가</button>
    </div>
  </div>

async function generateStory() {
  const apiKey = localStorage.getItem('ts_gemini_key');
  if (!apiKey) return alert('Gemini API 키를 입력하세요');
  const world = getSelectedWorld();
  if (!world) return alert('세계관을 선택하세요');
  const selectedIds = Array.from(document.querySelectorAll('#charSelector input:checked')).map(el => el.value);
  if (!selectedIds.length) return alert('등장인물을 1명 이상 선택하세요');
  const selectedChars = characters.filter(c => selectedIds.includes(c.id));
  const situation = document.getElementById('situation').value.trim();
  const extra = document.getElementById('extra').value.trim();
  const pov = document.getElementById('pov').value;
  const tone = document.getElementById('tone').value;
  const relation = document.getElementById('relation').value.trim();
  const breakRule = document.getElementById('breakRule').value.trim();

  document.getElementById('generateBtn').disabled = true;
  document.getElementById('loadingIndicator').style.display = 'block';
  document.getElementById('storyOutput').classList.remove('visible');

  try {
    const prompt = buildPrompt(world, selectedChars, situation, extra, pov, tone, '', relation, breakRule);
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.9, maxOutputTokens: 2000 } })
    });
    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const titleMatch = text.match(/제목[:\s]+(.+)/);
    const title = titleMatch ? titleMatch[1].trim() : '무제';
    const body = text.replace(/제목[:\s]+.+\n?/, '').trim();

    currentStory = {
      world_id: world.id,
      title,
      draft: body,
      final: '',
      characters_used: selectedChars.map(c => c.name),
      situation: situation || '일상',
      memo: ''
    };

    document.getElementById('outputTitle').textContent = title;
    document.getElementById('outputBody').textContent = body;
    document.getElementById('outputMemo').value = '';
    document.getElementById('outputTags').value = '';
    document.getElementById('outputMeta').textContent = selectedChars.map(c => c.name).join(' · ');
    document.getElementById('storyOutput').classList.add('visible');
  } catch(e) {
    alert('생성 오류: ' + e.message);
  } finally {
    document.getElementById('generateBtn').disabled = false;
    document.getElementById('loadingIndicator').style.display = 'none';
  }
}

function buildPrompt(world, chars, situation, extra, pov = "narrator", tone = "dry", draft = "", relation = "", breakRule = "") {

생존전략: ${c.strategy || ''}${c.goal ? `\n목표: ${c.goal}` : ''}${c.fear ? `\n두려움: ${c.fear}` : ''}`).join('\n\n');

  const povMap = {
    narrator: '전지적 작가 시점. 모든 인물의 내면을 알지만 독자에게 판단을 맡긴다.',

    victim: `가장 성실하게 일하는 인물의 1인칭 시점. 억울함을 직접 표현하지 않고 행동과 관찰로만 드러낸다.`,
    object: '창고 내 사물(바코드 스캐너, 컨베이어 벨트, 적재 팔레트 등)의 시점. 인간들을 무미건조하게 관찰하며 서술한다.'
  };

  const toneMap = {
    dry: '숨 막히는 현실감 + 건조한 유머. 웃기려 하지 말고 사실을 나열하는 것만으로 독자가 쓴웃음 짓게 만들어라.',
    malicious: '겉으로는 밝고 친절한 척하지만 모든 대사와 행동에 악의적 농담이 배어있다.',
    silent: '아무도 웃지 않는 농담만 오간다. 유머를 시도하지만 아무도 반응하지 않는 장면들이 반복된다.',
    absurd: '부조리극(카프카식). 비정상적 상황을 모두가 정상으로 받아들인다.'
  };

  const sharpenMode = draft ? `
== 재편집 모드 ==
아래 초안을 읽고 다음을 개선하라:
- 클리셰 표현 제거
- 감정을 직접 서술하지 말고 대사와 행동에 숨겨라
- 긴장감을 높여라
- 분량은 비슷하게 유지

[초안]
${draft}
` : '';

  return `당신은 블랙코미디 단편 소설 작가입니다.

== 세계관 ==
제목: ${world.title}
배경: ${world.setting || ''}
핵심 메시지: ${world.message || ''}

== 세계 규칙 (반드시 지켜야 함) ==
${rules}
※ 위 규칙을 위반하지 마세요. 이 세계에서 성실함은 보상받지 않습니다.

== 등장인물 ==
${charDesc}

== 고정 배경 인물 (NPC) ==
- 말없이 혼자 3인분을 쳐내는 이름 모를 고인물 (대사 없음, 행동으로만 존재)
- 출근 2시간 만에 화장실 간다며 사라진 신입 (뒷모습으로만 등장)

== 이번 에피소드 핵심 사건 ==
${situation || '평범해 보이는 작업일. 그러나 누군가는 오늘도 조금 더 지친다.'}

== 서술 시점 ==
${povMap[pov] || povMap.narrator}

== 톤 ==
${toneMap[tone] || toneMap.dry}

== 묘사 원칙 ==
- 감정을 직접 서술하지 말 것 (예: "화가 났다" ❌)
- 물류창고의 물리적 감각으로 감정을 표현할 것: 골판지 박스 먼지 냄새, PDA 바코드 스캐너의 신경질적인 삑 소리, 안전화 밑창이 끌리는 소리, 땀에 전 형광 조끼의 무게

${relation || '인물들 사이의 긴장감은 세계관 규칙에서 자연스럽게 도출할 것.'}

${breakRule ? `== 이번 편에서 조용히 어길 규칙 ==
"${breakRule}"
※ 이 규칙이 이번 에피소드에서 조용히 뒤집힌다. 모두가 눈치채지만 아무도 말하지 않는 방식으로 표현하라.` : ''}

== 서사 구조 (반드시 따를 것) ==
1. 도입: 오늘의 배경과 분위기를 물리적 감각으로 설정 (냄새, 소리, 온도)
2. 사건: 핵심 갈등 또는 돌발 상황 발생
3. 반응: 각 캐릭터가 자신의 생존 전략대로 움직임

5. 결말: 열린 결말. 교훈 없이. 독자가 판단하게.

== 추가 지시 ==
${extra || '없음'}
${sharpenMode}

== 출력 형식 ==
제목: [제목]

[본문 700~1100자. 대화와 행동 묘사 균형. 문단 사이 적절한 여백.]`;
}

async function sharpenStory() {
  const draft = document.getElementById('outputBody').textContent;
  if (!draft) return alert('먼저 스토리를 생성하세요');
  const world = getSelectedWorld();
  const selectedIds = Array.from(document.querySelectorAll('#charSelector input:checked')).map(el => el.value);
  const selectedChars = characters.filter(c => selectedIds.includes(c.id));
  const pov = document.getElementById('pov').value;
  const tone = document.getElementById('tone').value;
  const relation = document.getElementById('relation').value.trim();
  const breakRule = document.getElementById('breakRule').value.trim();
  const situation = document.getElementById('situation').value.trim();
  const extra = document.getElementById('extra').value.trim();

  document.getElementById('generateBtn').disabled = true;
  document.getElementById('loadingIndicator').style.display = 'block';

  try {
    const apiKey = localStorage.getItem('ts_gemini_key');
    const prompt = buildPrompt(world, selectedChars, situation, extra, pov, tone, draft, relation, breakRule);
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.75, maxOutputTokens: 2000 } })
    });
    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const titleMatch = text.match(/제목[:\s]+(.+)/);
    const title = titleMatch ? titleMatch[1].trim() : document.getElementById('outputTitle').textContent;
    const body = text.replace(/제목[:\s]+.+\n?/, '').trim();
    document.getElementById('outputTitle').textContent = title;
    document.getElementById('outputBody').textContent = body;
    if (currentStory) { currentStory.title = title; currentStory.draft = body; }
  } catch(e) {
    alert('오류: ' + e.message);
  } finally {
    document.getElementById('generateBtn').disabled = false;
    document.getElementById('loadingIndicator').style.display = 'none';
  }
}

${draft}

- 씬당 나레이션 15~25자 내외 (TTS 자연스럽게)
- 중간중간 "(웃음)", "(한숨)" 리액션 포함
- 총 5~7개 씬

== 출력 형식 ==
반드시 아래 형식으로만 출력하세요. 다른 텍스트 없이.

[씬1]
나레이션: 안녕하세요, 오늘 물류창고에서 있었던 썰 하나 풉니다...
연출: 어두운 물류창고, 컨베이어 벨트, 지친 직원들

[씬2]
나레이션: (나레이션 텍스트)
연출: (화면 묘사)

마지막 씬 나레이션은 반드시 "이런 경험 있으신 분? 공감되시면 좋아요 한 번만요"로 끝낼 것.`;

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.85, maxOutputTokens: 800 } })
    });
    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    document.getElementById('shortsBody').textContent = text;

}

async function saveCurrentStory() {
  if (!currentStory) return;
  currentStory.memo = document.getElementById('outputMemo').value;
  currentStory.final = document.getElementById('outputMemo').value;
  const tagsRaw = document.getElementById('outputTags').value;
  currentStory.tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
  const shortsText = document.getElementById('shortsBody').textContent;
  if (shortsText) currentStory.shorts_script = shortsText;
  const blogText = document.getElementById('blogBody').textContent;
  if (blogText) currentStory.blog_post = blogText;
  const snsText = document.getElementById('snsBody').textContent;
  if (snsText) currentStory.sns_content = snsText;
  const { error } = await sb.from('stories').insert(currentStory);
  if (error) return alert('저장 오류: ' + error.message);
  alert('저장되었습니다');
  currentStory = null;
  await loadStories();
}

// ====== 스토리 목록 ======
async function loadStories() {
  const { data } = await sb.from('stories').select('*').order('created_at', { ascending: false });
  stories = data || [];
  renderStoriesList();
}

function renderStoriesList() {
  const el = document.getElementById('storiesList');
  if (!stories.length) { el.innerHTML = '<div class="empty-state">저장된 스토리가 없습니다</div>'; return; }
  el.innerHTML = stories.map(s => `
    <div class="story-card" onclick="openStory('${s.id}')">
      <div class="flex-row" style="justify-content:space-between;margin-bottom:8px;">
        <div class="story-card-title">${s.title}</div>
        <button class="btn btn-danger" onclick="event.stopPropagation();deleteStory('${s.id}')">삭제</button>
      </div>
      <div style="margin-bottom:8px;">${(s.characters_used||[]).map(c=>`<span class="tag">${c}</span>`).join('')}</div>
      ${(s.tags||[]).length ? `<div style="margin-bottom:8px;">${s.tags.map(t=>`<span class="tag" style="color:var(--green);border-color:#2a4a3a;">${t}</span>`).join('')}</div>` : ''}
      <div class="story-card-preview">${s.draft || ''}</div>
      ${s.final ? '<div style="margin-top:6px;font-family:IBM Plex Mono,monospace;font-size:10px;color:var(--green);">✓ 최종안 있음</div>' : ''}
      ${s.shorts_script ? '<div style="margin-top:2px;font-family:IBM Plex Mono,monospace;font-size:10px;color:#6ab0f5;">🎬 쇼츠</div>' : ''}
      ${s.blog_post ? '<div style="margin-top:2px;font-family:IBM Plex Mono,monospace;font-size:10px;color:#8bc97a;">📝 블로그</div>' : ''}
      ${s.sns_content ? '<div style="margin-top:2px;font-family:IBM Plex Mono,monospace;font-size:10px;color:#c97ab8;">📱 SNS</div>' : ''}
      <div style="margin-top:10px;font-family:IBM Plex Mono,monospace;font-size:10px;color:var(--text-dim);">${new Date(s.created_at).toLocaleString('ko-KR')}</div>
    </div>
  `).join('');
}

function openStory(id) {
  const s = stories.find(x => x.id === id);
  if (!s) return;
  document.getElementById('modalContent').innerHTML = `
    <div class="world-badge">${(s.characters_used||[]).join(' · ')}</div>
    ${(s.tags||[]).length ? `<div style="margin-bottom:12px;">${s.tags.map(t=>`<span class="tag" style="color:var(--green);border-color:#2a4a3a;">${t}</span>`).join('')}</div>` : ''}
    <div class="story-title">${s.title}</div>
    <div class="story-body">${s.draft || ''}</div>
    ${s.memo ? `<div class="final-section"><div class="draft-label">메모 / 최종안</div><div class="story-body" style="font-size:14px;">${s.memo}</div></div>` : ''}
    ${s.shorts_script ? `<div class="final-section"><div class="draft-label" style="color:#6ab0f5;">🎬 쇼츠 대본</div><div class="story-body" style="font-size:13px;border-left:3px solid #6ab0f5;padding-left:16px;margin-top:8px;white-space:pre-wrap;">${s.shorts_script}</div></div>` : ''}
    ${s.blog_post ? `<div class="final-section"><div class="draft-label" style="color:#8bc97a;">📝 블로그 글</div><div class="story-body" style="font-size:13px;border-left:3px solid #8bc97a;padding-left:16px;margin-top:8px;white-space:pre-wrap;">${s.blog_post}</div></div>` : ''}
    ${s.sns_content ? `<div class="final-section"><div class="draft-label" style="color:#c97ab8;">📱 SNS 글</div><div class="story-body" style="font-size:13px;border-left:3px solid #c97ab8;padding-left:16px;margin-top:8px;white-space:pre-wrap;">${s.sns_content}</div></div>` : ''}
    <div class="story-meta"><span>${new Date(s.created_at).toLocaleString('ko-KR')}</span></div>
  `;
  document.getElementById('modalOverlay').classList.add('visible');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('visible'); }

async function deleteStory(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  await sb.from('stories').delete().eq('id', id);
  await loadStories();
}

// ====== 클립보드 복사 ======
function copyToClipboard(elementId) {
  const text = document.getElementById(elementId).innerText;
  if (!text.trim()) return alert('복사할 내용이 없습니다.');
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = '✓ 복사됨';
    btn.style.color = '#4a8c6e';
    setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
  }).catch(() => {
    // fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('복사되었습니다.');
  });
}

// ====== 탭 ======
function showTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'characters') renderCharactersList();
  if (name === 'stories') loadStories();
}
